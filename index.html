<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #050508; color: #d4af37; font-family: sans-serif; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; }
        #mapa-container { position: relative; width: 100vw; height: 100vh; background: #050508; }
        .nodo { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid #d4af37; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #d4af37; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div style="text-align: center;">
        <input type="text" id="nombre-input" placeholder="APELLIDO Nombre" style="padding: 10px;">
        <button onclick="iniciar()">ACEPTAR</button>
    </div>
</div>

<div id="mapa-container">
    <div id="estaciones"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function iniciar() {
        const val = document.getElementById('nombre-input').value;
        if (!val) return;
        localStorage.setItem("usuarioActual", val);
        document.getElementById('login-overlay').style.display = 'none';
        crearMapa();
    }

    function crearMapa() {
        const container = document.getElementById('estaciones');
        const ests = [{id: 1, x: 20, y: 50}, {id: 2, x: 40, y: 20}];
        ests.forEach(e => {
            const div = document.createElement('div');
            div.className = 'nodo';
            div.style.left = e.x + '%';
            div.style.top = e.y + '%';
            div.innerHTML = "Estación " + e.id;
            div.onclick = () => window.location.href = "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/";
            container.appendChild(div);
        });
    }

    if (localStorage.getItem("usuarioActual")) {
        document.getElementById('login-overlay').style.display = 'none';
        crearMapa();
    }
</script>
</body>
</html>
