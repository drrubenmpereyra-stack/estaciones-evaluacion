<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #050508; color: #d4af37; font-family: sans-serif; overflow: hidden; }
        #mapa-container { position: relative; width: 100vw; height: 100vh; background: url('neuro.png') center/cover no-repeat; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.6); z-index: 1; }
        
        /* Estilos del Login */
        #login-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: #0d1117; padding: 30px; border: 1px solid #d4af37; border-radius: 10px; text-align: center; }
        input { padding: 10px; width: 250px; background: #050508; border: 1px solid #d4af37; color: #d4af37; }
        button { padding: 10px 20px; background: #d4af37; border: none; cursor: pointer; color: #000; font-weight: bold; }

        .nodo { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: rgba(13, 17, 23, 0.9); border: 2px solid #d4af37; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; z-index: 10; font-size: 0.6em; font-weight: bold; text-align: center; }
        .nodo:hover { transform: scale(1.1); background: #d4af37; color: #000; }
    </style>
</head>
<body>

<div id="login-box">
    <h3>APELLIDO Nombre</h3>
    <input type="text" id="nombre-input" placeholder="Ej: PEREYRA Ruben">
    <button onclick="guardarNombre()">ACEPTAR</button>
</div>

<div id="mapa-container">
    <div class="overlay"></div>
    <div id="estaciones"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const estaciones = [
        { id: 1, x: 20, y: 50, nombre: "Intersubjetividad" },
        { id: 2, x: 30, y: 25, nombre: "Memoria" },
        { id: 3, x: 45, y: 15, nombre: "Deseo" },
        { id: 4, x: 65, y: 20, nombre: "Marcador Somático" },
        { id: 5, x: 80, y: 45, nombre: "Repetición" },
        { id: 6, x: 75, y: 70, nombre: "Plasticidad" },
        { id: 7, x: 55, y: 80, nombre: "Sueño/Alucinación" },
        { id: 8, x: 30, y: 75, nombre: "Ello Somático" },
        { id: 9, x: 50, y: 45, nombre: "Focalización" },
        { id: 10, x: 50, y: 92, nombre: "Ética/Cerebro Digital" }
    ];

    function guardarNombre() {
        const nombre = document.getElementById('nombre-input').value;
        if (nombre.trim() !== "") {
            localStorage.setItem("usuarioActual", nombre);
            document.getElementById('login-box').style.display = 'none';
            renderizarMapa();
        }
    }

    function renderizarMapa() {
        const container = document.getElementById('estaciones');
        container.innerHTML = ''; 
        estaciones.forEach(est => {
            const div = document.createElement('div');
            div.className = 'nodo';
            div.style.left = est.x + '%';
            div.style.top = est.y + '%';
            div.innerHTML = `<span>${est.id}</span> ${est.nombre}`;
            div.onclick = () => {
                if (est.id === 1) window.location.href = "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/";
                else window.location.href = `encuentro.html?id=${est.id}`;
            };
            container.appendChild(div);
        });
    }

    // Verificar si ya existe un nombre guardado
    if (localStorage.getItem("usuarioActual")) {
        document.getElementById('login-box').style.display = 'none';
        renderizarMapa();
    }
</script>
</body>
</html>
