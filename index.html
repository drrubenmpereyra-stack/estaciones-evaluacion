<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <!-- Mantenemos Firebase por si acaso, aunque ya no hay login en el mapa -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        #app { width: 100vw; height: 100vh; background: url('neuro.png') center/cover no-repeat; position: relative; }
        
        /* Nodos del Mapa */
        .nodo { position: absolute; width: 90px; height: 90px; border-radius: 50%; background: rgba(212, 175, 55, 0.15); border: 2px solid #d4af37; color: #d4af37; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.75em; cursor: pointer; transition: 0.4s; z-index: 10; text-decoration: none; box-sizing: border-box; padding: 5px;}
        .nodo:hover { transform: scale(1.15) translateY(-5px); box-shadow: 0 5px 25px rgba(212, 175, 55, 0.6); background: rgba(212, 175, 55, 0.3); }

        /* Estado Desactivado (Para estaciones no disponibles aún) */
        .nodo.desactivado { border-color: #444; color: #666; background: rgba(100,100,100,0.1); cursor: default; }
        .nodo.desactivado:hover { transform: none; box-shadow: none; background: rgba(100,100,100,0.1); }
    </style>
</head>
<body>

<div id="app">
    <!-- El mapa ahora es visible directamente al cargar -->
    <div id="mapa"></div>
</div>

<script>
    // Configuración de Firebase (No se usa actualmente, pero se mantiene para no romper nada)
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const estaciones = [
        { id: 1, x: 15, y: 50, nombre: "Cartografía de la Intersubjetividad", disponible: true },
        { id: 2, x: 25, y: 30, nombre: "Memorias traumáticas", disponible: true }, 
        { id: 3, x: 35, y: 20, nombre: "Circuitos de recompensa", disponible: false },
        { id: 4, x: 45, y: 25, nombre: "Interfaz mente cuerpo", disponible: false },
        { id: 5, x: 55, y: 40, nombre: "Neurobiología de la repetición", disponible: false },
        { id: 6, x: 65, y: 30, nombre: "Plasticidad simbólica y sináptica", disponible: false },
        { id: 7, x: 75, y: 45, nombre: "Arquitectura del sueño", disponible: false },
        { id: 8, x: 65, y: 60, nombre: "El Ello somático", disponible: false },
        { id: 9, x: 50, y: 70, nombre: "Estructuras límbicas", disponible: false },
        { id: 10, x: 35, y: 80, nombre: "Ética de la singularidad", disponible: false }
    ];

    const mapa = document.getElementById('mapa');
    
    estaciones.forEach(est => {
        const div = document.createElement('a'); 
        div.id = 'nodo-' + est.id;
        div.style.left = est.x + '%';
        div.style.top = est.y + '%';
        div.innerHTML = est.nombre;
        
        if (est.disponible) {
            div.className = 'nodo';
            div.href = "#"; // Necesario para que el <a> funcione correctamente

            // Lógica de redirección por ID (Solo para las disponibles)
            div.onclick = (e) => {
                e.preventDefault(); // Previene la recarga de página

                if (est.id === 1) {
                    window.location.href = "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/";
                } 
                // === ENLACE CORREGIDO SEGÚN HECHO FÁCTICO ===
                else if (est.id === 2) {
                    window.location.href = "https://drrubenmpereyra-stack.github.io/estacion2/";
                }
            };
        } else {
            // Estilo para estaciones futuras
            div.className = 'nodo desactivado';
            div.onclick = (e) => e.preventDefault(); // No hace nada
        }
        
        mapa.appendChild(div);
    });
</script>
</body>
</html>
