<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Capa del Video Intro */
        #intro-overlay { position: fixed; top:0; left:0; width:100%; height:100%; z-index: 9999; background: #000; transition: opacity 1s ease; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* Mapa Principal */
        #app { width: 100vw; height: 100vh; background: url('neuro.png') center/cover no-repeat; position: relative; opacity: 0; transition: opacity 1s ease; }
        
        .nodo { 
            position: absolute; width: 90px; height: 90px; border-radius: 50%; 
            background: rgba(212, 175, 55, 0.2); border: 2px solid #d4af37; color: #d4af37; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            font-size: 0.7em; text-decoration: none; transition: 0.3s; z-index: 10; cursor: pointer; padding: 5px; box-sizing: border-box;
        }
        .nodo:hover { transform: scale(1.1); box-shadow: 0 0 15px #d4af37; }
    </style>
</head>
<body>

<div id="intro-overlay">
    <video id="intro-video" autoplay playsinline muted>
        <source src="https://github.com/drrubenmpereyra-stack/intro-estaciones/raw/refs/heads/main/intro_estaciones.mp4" type="video/mp4">
    </video>
</div>

<div id="app">
    <div id="mapa"></div>
</div>

<script>
    const estaciones = [
        { id: 1, x: 15, y: 50, nombre: "Cartografía de la Intersubjetividad", url: "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/" },
        { id: 2, x: 25, y: 30, nombre: "Memorias traumáticas", url: "https://drrubenmpereyra-stack.github.io/estacion2/" },
        { id: 3, x: 35, y: 20, nombre: "Circuitos de recompensa", url: "https://drrubenmpereyra-stack.github.io/estacion-3/" },
        { id: 4, x: 45, y: 25, nombre: "Interfaz mente cuerpo", url: "https://drrubenmpereyra-stack.github.io/estacion4/" },
        { id: 5, x: 55, y: 40, nombre: "Neurobiología de la repetición", url: "https://drrubenmpereyra-stack.github.io/estacion-5/" },
        { id: 6, x: 65, y: 30, nombre: "Plasticidad simbólica y sináptica", url: "https://drrubenmpereyra-stack.github.io/estacion6/" },
        { id: 7, x: 75, y: 45, nombre: "Arquitectura del sueño", url: "https://drrubenmpereyra-stack.github.io/estacion7/" },
        { id: 8, x: 65, y: 60, nombre: "El Ello somático", url: "#" },
        { id: 9, x: 50, y: 70, nombre: "Estructuras límbicas", url: "#" },
        { id: 10, x: 35, y: 80, nombre: "Etica de la singularidad", url: "#" }
    ];

    const mapa = document.getElementById('mapa');
    estaciones.forEach(est => {
        const a = document.createElement('a');
        a.className = 'nodo';
        a.style.left = est.x + '%';
        a.style.top = est.y + '%';
        a.innerHTML = est.nombre;
        a.href = est.url;
        mapa.appendChild(a);
    });

    // Lógica Intro
    const video = document.getElementById('intro-video');
    const overlay = document.getElementById('intro-overlay');
    const app = document.getElementById('app');

    video.onended = () => {
        overlay.style.opacity = '0';
        app.style.opacity = '1';
        setTimeout(() => { overlay.style.display = 'none'; }, 1000);
    };

    overlay.onclick = () => {
        overlay.style.opacity = '0';
        app.style.opacity = '1';
        setTimeout(() => { overlay.style.display = 'none'; }, 1000);
    };
</script>

</body>
</html>
