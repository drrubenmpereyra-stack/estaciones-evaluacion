<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#000; color:#d4af37;">

    <div id="input-area">
        <input type="text" id="nombre" placeholder="APELLIDO Nombre">
        <button onclick="guardar()">ACEPTAR</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function guardar() {
            const val = document.getElementById('nombre').value;
            if(!val) return;
            localStorage.setItem("usuarioActual", val);
            await db.collection("progreso").doc(val).set({ nombre: val }, { merge: true });
            alert("Grabado en base de datos: " + val);
        }
    </script>
</body>
</html>
